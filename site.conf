# HTTP → HTTPS redirect for frontend
server {
    listen 80;
    server_name cameroonskills.org www.cameroonskills.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTP → HTTPS redirect for backend API
server {
    listen 80;
    server_name api.cameroonskills.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Frontend
server {
    listen 443 ssl http2;
    server_name cameroonskills.org www.cameroonskills.org;

    ssl_certificate /etc/letsencrypt/live/cameroonskills.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cameroonskills.org/privkey.pem;

    location / {
        proxy_pass http://frontend:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# HTTPS — Backend API
server {
    listen 443 ssl http2;
    server_name api.cameroonskills.org;

    ssl_certificate /etc/letsencrypt/live/cameroonskills.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cameroonskills.org/privkey.pem;

    # Allow backend image uploads.
    # App allows up to 3 images x 3MB each, plus multipart/form-data overhead.
    client_max_body_size 15M;
    client_body_timeout 120s;

    location / {
        proxy_pass http://backend:3000;

        proxy_http_version 1.1;
        proxy_request_buffering off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
          